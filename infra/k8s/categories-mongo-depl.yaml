apiVersion: apps/v1
kind: Deployment
metadata:
  name: categories-mongo-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: categories-mongo
  template:
    metadata:
      labels:
        app: categories-mongo
    spec:
      containers:
        - name: categories-mongo
          image: mongo
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: categories-mongo-srv
spec:
  selector:
    app: categories-mongo
  ports:
    - name: db
      protocol: TCP
      port: 27017
      targetPort: 27017
