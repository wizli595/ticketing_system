upstream auth_upstream {
    server auth:3000;
}
upstream tickets_upstream {
    server tickets:3000;
}
upstream orders_upstream {
    server orders:3000;
}
upstream payments_upstream {
    server payments:3000;
}
upstream categories_upstream {
    server categories:3000;
}
upstream client_upstream {
    server client-v2:3000;
}

server {
    listen 80;

    location /api/users {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tickets {
        proxy_pass http://tickets_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/orders {
        proxy_pass http://orders_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/payments {
        proxy_pass http://payments_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/categories {
        proxy_pass http://categories_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://client_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
