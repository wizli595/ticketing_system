apiVersion: skaffold/v3alpha1
kind: Config
manifests:
    rawYaml:
        - ./infra/k8s/*
build:
    local:
        push: false
    artifacts:
        - image: abdessalamwizli/auth
          context: auth
          docker:
              dockerfile: Dockerfile
          sync:
              manual:
                  - dest: .
                    src: "src/**/*.ts"
        - image: abdessalamwizli/client-v2
          context: client-v2
          docker:
              dockerfile: Dockerfile
          sync:
              manual:
                  - dest: .
                    src: "**/*.{ts,tsx}"
        - image: abdessalamwizli/tickets
          context: tickets
          docker:
              dockerfile: Dockerfile
          sync:
              manual:
                  - dest: .
                    src: "src/**/*.ts"
        - image: abdessalamwizli/orders
          context: orders
          docker:
              dockerfile: Dockerfile
          sync:
              manual:
                  - dest: .
                    src: "src/**/*.ts"
        - image: abdessalamwizli/expiration
          context: expiration
          docker:
              dockerfile: Dockerfile
          sync:
              manual:
                  - dest: .
                    src: "src/**/*.ts"
        - image: abdessalamwizli/payments
          context: payments
          docker:
              dockerfile: Dockerfile
          sync:
               manual:
                   - dest: .
                     src: "src/**/*.ts"
        - image: abdessalamwizli/categories
          context: categories
          docker:
              dockerfile: Dockerfile
          sync:
              manual:
                  - dest: .
                    src: "src/**/*.ts"

